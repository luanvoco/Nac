const K = { logs:'bt_logs', timer:'bt_timer', settings:'bt_settings', schedules:'bt_schedules', growth:'bt_growth', health:'bt_health', vaccines:'bt_vaccines', mood:'bt_mood' }
// Bọc localStorage.setItem để không crash khi bộ nhớ đầy hoặc bị chặn
// (ví dụ Safari chế độ duyệt web riêng tư) — báo cho người dùng biết thay vì mất dữ liệu âm thầm.
let _storageWarned = false
function safeSetItem(key, value) {
  try { localStorage.setItem(key, value); return true }
  catch(err) {
    console.error('Lưu thất bại:', key, err)
    if(!_storageWarned) {
      _storageWarned = true
      alert('⚠️ Không lưu được dữ liệu vào máy! Bộ nhớ trình duyệt có thể đã đầy hoặc bị chặn (ví dụ chế độ duyệt web riêng tư). Hãy xuất dữ liệu ra file JSON ngay để không bị mất, và tránh dùng chế độ riêng tư cho app này.')
    }
    return false
  }
}
const store = {
  getLogs:      ()  => { try{ return JSON.parse(localStorage.getItem(K.logs)||'{}') }catch{ return {} } },
  setLogs:      (v) => safeSetItem(K.logs, JSON.stringify(v)),
  getTimer:     ()  => { try{ return JSON.parse(localStorage.getItem(K.timer)||'null') }catch{ return null } },
  setTimer:     (v) => v ? safeSetItem(K.timer,JSON.stringify(v)) : (()=>{ try{ localStorage.removeItem(K.timer) }catch(err){ console.error(err) } })(),
  getSettings:  ()  => { try{ return JSON.parse(localStorage.getItem(K.settings)||'{}') }catch{ return {} } },
  setSettings:  (v) => safeSetItem(K.settings, JSON.stringify(v)),
  getSchedules: ()  => { try{ return JSON.parse(localStorage.getItem(K.schedules)||'[]') }catch{ return [] } },

function logsForDate(d) { return (store.getLogs()[d]||[]).sort((a,b)=>a.startTime.localeCompare(b.startTime)) }
function logDates()     { return Object.keys(store.getLogs()).sort().reverse() }
// Gồm cả phiên đang chạy (chưa bấm Dừng) vào dữ liệu của ngày đó, để các bảng tổng kết
// (Hôm nay / Theo ngày / Tuần) phản ánh đúng những gì đang diễn ra ngay lúc này,
// thay vì phải đợi bấm "Dừng ✅" mới được tính.
function effectiveLogsForDate(d) {
  const logs = logsForDate(d)
  if (S.timer && S.timer.date === d) {
    const liveDur = Math.max(0, Math.floor((Date.now()-S.timer.ts)/60000))
    return [...logs, { id:'_live', activityId:S.timer.actId, startTime:S.timer.startTime, endTime:nowS(), duration:liveDur, note:'', inProgress:true }]
  }
  return logs
}
function upsertEntry(dateStr, entry) {
  const all = store.getLogs()
  if (!all[dateStr]) all[dateStr] = []
  const i = all[dateStr].findIndex(e=>e.id===entry.id)
  if (i>=0) all[dateStr][i]=entry; else all[dateStr].push(entry)
  store.setLogs(all)
}
function removeEntry(dateStr, id) {
  const all = store.getLogs()
  if (!all[dateStr]) return
  all[dateStr] = all[dateStr].filter(e=>e.id!==id)
  store.setLogs(all)
}

const uid  = () => Date.now()+'_'+Math.random().toString(36).slice(2,6)
const pad  = (n) => String(n).padStart(2,'0')
const nowS = () => { const d=new Date(); return pad(d.getHours())+':'+pad(d.getMinutes()) }
// Escape HTML — bắt buộc dùng cho MỌI text do người dùng nhập trước khi chèn vào template HTML
// (tên bé, ghi chú, tên lịch mẫu...), để tránh chèn được thẻ <script>/onerror=... (XSS).
const ESC_MAP = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}
function esc(s) { return String(s??'').replace(/[&<>"']/g, c=>ESC_MAP[c]) }
function todayStr() { const d=new Date(); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()) }
function shiftDate(s,delta) {
  const [y,mo,d]=s.split('-').map(Number), dt=new Date(y,mo-1,d)
  dt.setDate(dt.getDate()+delta)
  return dt.getFullYear()+'-'+pad(dt.getMonth()+1)+'-'+pad(dt.getDate())
}
function calcDur(start,end) {
  const [sh,sm]=start.split(':').map(Number),[eh,em]=end.split(':').map(Number)
  let d=(eh*60+em)-(sh*60+sm); return d<0?d+1440:d
}
function addMins(timeStr,mins) {
  const [h,m]=timeStr.split(':').map(Number),total=(h*60+m+mins)%1440
  return pad(Math.floor(total/60))+':'+pad(total%60)
}
function fmtDur(m) {
  if(!m||m<=0) return ''
  const h=Math.floor(m/60),mn=m%60
  if(h===0) return mn+'phút'; if(mn===0) return h+'h'; return h+'h'+pad(mn)
}
function fmtElapsed(s) {
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60
  return h>0?h+':'+pad(m)+':'+pad(sec):pad(m)+':'+pad(sec)
}
function fmtDate(s) {
  const [y,mo,d]=s.split('-').map(Number),dt=new Date(y,mo-1,d)
  const days=['CN','T.2','T.3','T.4','T.5','T.6','T.7']
  return days[dt.getDay()]+', '+d+'/'+mo
}
function fmtDateLong(s) {
  const [y,mo,d]=s.split('-').map(Number),dt=new Date(y,mo-1,d)
  const days=['Chủ nhật','Thứ 2','Thứ 3','Thứ 4','Thứ 5','Thứ 6','Thứ 7']
  return days[dt.getDay()]+', '+d+'/'+mo+'/'+y
}
function fmtAgo(ts) {
  const mins = Math.floor((Date.now()-ts)/60000)
  if (mins < 1)  return 'vừa xong'
  if (mins < 60) return mins+'p trước'
  const h=Math.floor(mins/60),m=mins%60
  return m>0 ? h+'h '+m+'p trước' : h+'h trước'
}

// Weekly data helpers
function getWeekDates() {
  const today=todayStr(), dates=[]
  for(let i=6;i>=0;i--) dates.push(shiftDate(today,-i))
  return dates
}
function weeklyStats() {
  const dates=getWeekDates()
  const withData=dates.map(d=>{
    const logs=d===todayStr()?effectiveLogsForDate(d):logsForDate(d)
    return {date:d,s:summary(logs),logs}
  }).filter(d=>d.logs.length>0)
  if(!withData.length) return null
  const n=withData.length
  const avg = {
    feed:    +(withData.reduce((s,d)=>s+d.s.feed,0)/n).toFixed(1),
    sleep:   Math.round(withData.reduce((s,d)=>s+d.s.sleep,0)/n),
    diapers: +(withData.reduce((s,d)=>s+d.s.diapers,0)/n).toFixed(1),
    days:    n,
  }
  // Trung bình ngủ ngày (06:00-20:00) / ngủ đêm (20:00-06:00) mỗi ngày
  const splits=withData.map(d=>splitSleepDayNight(d.logs))
  avg.sleepDay   = Math.round(splits.reduce((s,sp)=>s+sp.day,0)/n)
  avg.sleepNight = Math.round(splits.reduce((s,sp)=>s+sp.night,0)/n)
  // wake window avg: avg time between sleep sessions
  let totalWake=0, wakeCount=0
  withData.forEach(({logs})=>{
    const sleeps=logs.filter(l=>l.activityId==='sleep').sort((a,b)=>a.startTime.localeCompare(b.startTime))
    for(let i=1;i<sleeps.length;i++) {
      const gap=calcDur(sleeps[i-1].endTime||sleeps[i-1].startTime, sleeps[i].startTime)
      if(gap>0&&gap<300){ totalWake+=gap; wakeCount++ }
    }
  })
  avg.wake = wakeCount>0 ? Math.round(totalWake/wakeCount) : null
  return { avg, dates, withData }
}


// Day/Night sleep split (Ngày: 06:00-20:00, Đêm: 20:00-06:00)
function calcDaySleepMins(startMins, duration) {
  const DAY_S=360, DAY_E=1200, FULL=1440
  let day=0, rem=duration, cur=startMins%FULL
  while(rem>0){
    let chunk
    if(cur>=DAY_S && cur<DAY_E){ chunk=Math.min(rem,DAY_E-cur); day+=chunk }
    else if(cur>=DAY_E)        { chunk=Math.min(rem,FULL-cur) }
    else                       { chunk=Math.min(rem,DAY_S-cur) }
    rem-=chunk; cur=(cur+chunk)%FULL
  }
  return day
}
function splitSleepDayNight(logs) {
  let day=0, night=0
  logs.filter(l=>l.activityId==='sleep'&&l.duration>0).forEach(l=>{
    const [h,m]=l.startTime.split(':').map(Number)
    const d=calcDaySleepMins(h*60+m, l.duration)
    day+=d; night+=l.duration-d
  })
  return { day, night }
}

// TIMER

function tickStart() {
  if(_ticker) clearInterval(_ticker)
  _ticker=setInterval(()=>{
    if(!S.timer) return
    // Cập nhật state ngầm (không gọi set()/draw() — tránh vẽ lại toàn bộ app mỗi giây,
    // việc này từng làm mất nội dung đang gõ dở trong các ô input khác như ghi chú).
    S.elapsed = Math.floor((Date.now()-S.timer.ts)/1000)
    const el = document.getElementById('timerElapsedEl')
    if(el) el.textContent = fmtElapsed(S.elapsed)
    // Mỗi khi tròn phút, làm mới các số liệu "sống" (Ngủ ngày/đêm đang chạy, "X phút trước"...)
    // — nhưng chỉ khi không ai đang gõ dở trong ô input/textarea nào, để không mất chữ.
    const ae=document.activeElement, typing=ae&&(ae.tagName==='INPUT'||ae.tagName==='TEXTAREA')
    if(S.elapsed>0 && S.elapsed%60===0 && !typing) draw()
  },1000)
}
function timerStart(act) {
  const t={actId:act.id,startTime:nowS(),ts:Date.now(),date:S.date}
  store.setTimer(t); tickStart(); set({timer:t,elapsed:0})
}
function timerStop() {
  if(!S.timer) return
  const end=nowS()
  let dur=calcDur(S.timer.startTime,end)
  // Đã bấm "Dừng ✅" tức là hoạt động có thật. Nếu bắt đầu/kết thúc rơi vào cùng 1 phút
  // đồng hồ (HH:MM giống nhau), dur sẽ tính ra 0 và biến mất khỏi mọi tổng kết — nên
  // luôn làm tròn lên tối thiểu 1 phút cho các phiên đã chủ động dừng.
  if(dur===0) dur=1
  const entry={id:uid(),activityId:S.timer.actId,startTime:S.timer.startTime,endTime:end,duration:dur,note:''}
  upsertEntry(S.timer.date,entry)
  afterFeedLog(entry)
  store.setTimer(null); if(_ticker) clearInterval(_ticker); set({timer:null,elapsed:0})
}

let _reminderTimer = null

function scheduleReminder() {
  const cfg = store.getSettings()
  if(!cfg.reminderOn) return
  if(_reminderTimer) clearTimeout(_reminderTimer)
  const mins = cfg.reminderInterval || 150
  _reminderTimer = setTimeout(()=>{
    if(Notification.permission==='granted') {
      new Notification('🍼 ' + S.babyName, {
        body: 'Đến giờ cho bé ăn rồi! 🍼',
        tag: 'feed-reminder',
        icon: ''
      })
    }
    set({ feedReminder: true })
  }, mins * 60 * 1000)
}

function clearReminder() {
  if(_reminderTimer) clearTimeout(_reminderTimer)
  _reminderTimer = null
  set({ feedReminder: false })
}

function snoozeReminder() {
  set({ feedReminder: false })
  if(_reminderTimer) clearTimeout(_reminderTimer)
  _reminderTimer = setTimeout(()=>{ set({ feedReminder: true }) }, 30*60*1000)
}

async function requestNotifPermission() {
  if(!('Notification' in window)) { alert('Trình duyệt này không hỗ trợ thông báo'); return }
  const result = await Notification.requestPermission()
  const cfg = store.getSettings()
  store.setSettings({...cfg, notifPermission: result})
  draw()
}

function initReminderOnLoad() {
  const cfg = store.getSettings()
  if(!cfg.reminderOn || !cfg.lastFeedTs) return
  const elapsed = Date.now() - cfg.lastFeedTs
  const interval = (cfg.reminderInterval || 150) * 60 * 1000
  const remaining = interval - elapsed
  if(remaining <= 0) {
    set({ feedReminder: true })
  } else {
    if(_reminderTimer) clearTimeout(_reminderTimer)
    _reminderTimer = setTimeout(()=>{
      if(Notification.permission==='granted') {
        new Notification('🍼 ' + S.babyName, { body:'Đến giờ cho bé ăn rồi! 🍼', tag:'feed-reminder' })
      }
      set({ feedReminder: true })
    }, remaining)
  }
}

function updateLastFeedSide(entry) {
  if(entry.activityId !== 'feed') return
  if(!isBreast(entry.feedType)) return
  const cfg = store.getSettings()
  store.setSettings({...cfg,
    lastFeedSide: { side: entry.feedType, time: entry.startTime, ts: Date.now() },
    lastFeedTs: Date.now()
  })
}

function getNextSide(lastSide) {
  if(lastSide==='breast_left')  return { id:'breast_right', label:'BÚ PHẢI', emoji:'→ 🤱' }
  if(lastSide==='breast_right') return { id:'breast_left',  label:'BÚ TRÁI', emoji:'← 🤱' }
  return null
}

function getSideSuggestion() {
  const cfg = store.getSettings()
  const last = cfg.lastFeedSide
  if(!last || !isBreast(last.side)) return null
  const next = getNextSide(last.side)
  const lastLabel = last.side==='breast_left' ? 'TRÁI' : 'PHẢI'
  return { lastSide: last.side, lastLabel, next, time: last.time, ts: last.ts }
}

// Called after any feed entry is saved
function afterFeedLog(entry) {
  if(entry.activityId !== 'feed') return
  updateLastFeedSide(entry)
  const cfg = store.getSettings()
  store.setSettings({...cfg, lastFeedTs: Date.now()})
  clearReminder()
  scheduleReminder()
}

function tapActivity(act) {
  if(act.hasTimer) {
    if(S.timer?.actId===act.id) timerStop()
    else if(S.timer) openModal({mode:'add',actId:act.id})
    else timerStart(act)
  } else {
    const t=nowS()
    const entry={id:uid(),activityId:act.id,startTime:t,endTime:t,duration:0,note:''}
    upsertEntry(S.date,entry)
    draw()
  }
}
function openModal(opts) {
  // Auto-suggest next breast side
  const sug = getSideSuggestion()
  if(opts.mode==='add' && (!opts.actId||opts.actId==='feed') && sug?.next) {
    opts = {...opts, actId:'feed', _f:{ feedType: sug.next.id }}
  }

      const d=JSON.parse(e.target.result)
      if(d.logs)      store.setLogs(d.logs)
      if(d.schedules) store.setSchedules(d.schedules)
      if(d.growth)    store.setGrowth(d.growth)

      if(d.vaccines)  store.setVaccines(d.vaccines)

      if(d.settings)       store.setSettings({...store.getSettings(),...d.settings})
      else if(d.babyName)  store.setSettings({...store.getSettings(),babyName:d.babyName})

    } catch { alert('File không hợp lệ!') }
  }
  r.readAsText(file)
}

function exportAsImage() {
  const logs=logsForDate(S.date)
  if(!logs.length){ alert('Chưa có dữ liệu ngày này!'); return }
  const dpr=Math.min(window.devicePixelRatio||2,3),W=680,PAD=36
  const ROW=62,HDR=110,SUM=80,FTR=44,H=HDR+logs.length*ROW+SUM+FTR+PAD
  const canvas=document.createElement('canvas')
  canvas.width=W*dpr; canvas.height=H*dpr
  const ctx=canvas.getContext('2d'); ctx.scale(dpr,dpr)
  const AC={feed:{dot:'#f59e0b',bg:'#fffbeb',text:'#78350f'},sleep:{dot:'#3b82f6',bg:'#eff6ff',text:'#1e3a8a'},
    play:{dot:'#22c55e',bg:'#f0fdf4',text:'#14532d'},bath:{dot:'#06b6d4',bg:'#ecfeff',text:'#164e63'},
    diaper_wet:{dot:'#0ea5e9',bg:'#f0f9ff',text:'#0c4a6e'},diaper_dirty:{dot:'#f97316',bg:'#fff7ed',text:'#7c2d12'}}
  ctx.fillStyle='#f8f5f2'; ctx.fillRect(0,0,W,H)
  ctx.shadowColor='rgba(0,0,0,0.08)'; ctx.shadowBlur=24; ctx.shadowOffsetY=4
  ctx.fillStyle='#fff'; rrect(ctx,PAD/2,PAD/2,W-PAD,H-PAD,20); ctx.fill()
  ctx.shadowColor='transparent'; ctx.shadowBlur=0
  const g=ctx.createLinearGradient(PAD/2,PAD/2,W-PAD/2,PAD/2)
  g.addColorStop(0,'#fecdd3'); g.addColorStop(1,'#fda4af')
  ctx.fillStyle=g; rrectTop(ctx,PAD/2,PAD/2,W-PAD,HDR,20); ctx.fill()
  ctx.font='32px serif'; ctx.textAlign='left'; ctx.fillText('🍼',PAD+8,PAD/2+52)
  ctx.fillStyle='#7f1d1d'; ctx.font='bold 26px -apple-system,sans-serif'; ctx.fillText(S.babyName,PAD+54,PAD/2+50)
  ctx.fillStyle='#9f1239'; ctx.font='500 15px -apple-system,sans-serif'; ctx.fillText(fmtDateLong(S.date),PAD+54,PAD/2+74)
  let y=PAD/2+HDR+4
  logs.forEach((e,i)=>{
    const a=getAct(e.activityId); if(!a) return; const c=AC[e.activityId]||AC.feed
    if(i%2===0){ ctx.fillStyle='#fafafa'; ctx.fillRect(PAD/2+1,y,W-PAD-2,ROW) }
    ctx.beginPath(); ctx.arc(PAD+22,y+ROW/2,18,0,Math.PI*2); ctx.fillStyle=c.dot; ctx.fill()
    ctx.font='20px serif'; ctx.textAlign='center'; ctx.fillText(a.emoji,PAD+22,y+ROW/2+7)
    ctx.textAlign='left'; ctx.fillStyle=c.text; ctx.font='bold 15px -apple-system,sans-serif'; ctx.fillText(a.label,PAD+52,y+ROW/2-6)
    if(e.feedType){const lw=ctx.measureText(a.label).width;ctx.font='12px -apple-system,sans-serif';ctx.fillStyle='#92400e';ctx.fillText('· '+ftLabel(e.feedType),PAD+56+lw,y+ROW/2-6)}
    ctx.font='500 13px ui-monospace,monospace'; ctx.fillStyle='#6b7280'
    ctx.fillText(e.startTime+(e.endTime&&e.endTime!==e.startTime?' → '+e.endTime:''),PAD+52,y+ROW/2+13)
    if(e.duration>0){ctx.textAlign='right';ctx.font='bold 14px -apple-system,sans-serif';ctx.fillStyle=c.text;ctx.fillText(fmtDur(e.duration),W-PAD-16,y+ROW/2+5)}
    ctx.textAlign='left'; y+=ROW
  })
  ctx.strokeStyle='#f3f4f6'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.moveTo(PAD/2+1,y+8); ctx.lineTo(W-PAD/2-1,y+8); ctx.stroke()
  const s=summary(logs),items=[]
  if(s.feed) items.push('🍼 '+s.feed+' lần'); if(s.sleep) items.push('😴 '+fmtDur(s.sleep))
  if(s.diapers) items.push('🚼 '+s.diapers+' tã'); if(s.play) items.push('🎮 '+s.play+' lần')
  const sumY=y+SUM/2+14,step=(W-PAD*2)/Math.max(items.length,1)
  ctx.textAlign='center'
  items.forEach((item,i)=>{
    const cx=PAD+step*i+step/2; ctx.font='16px serif'; ctx.fillText(item.split(' ')[0],cx,sumY-6)
    ctx.font='bold 13px -apple-system,sans-serif'; ctx.fillStyle='#374151'; ctx.fillText(item.slice(item.indexOf(' ')+1),cx,sumY+12)
  })
  ctx.textAlign='center'; ctx.font='12px -apple-system,sans-serif'; ctx.fillStyle='#d1d5db'
  ctx.fillText('Baby Tracker · '+S.babyName+' · '+fmtDateLong(S.date),W/2,H-PAD/2-14)
  canvas.toBlob(blob=>{
    if(!blob){alert('Lỗi tạo ảnh!');return}
    const file=new File([blob],'baby-'+S.date+'.png',{type:'image/png'})
    if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]}))
      navigator.share({files:[file],title:S.babyName+' · '+fmtDate(S.date)}).catch(()=>{})
    else {
      const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(blob),download:'baby-'+S.date+'.png'})
      document.body.appendChild(a); a.click(); document.body.removeChild(a)
    }
  },'image/png')
}
function rrect(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r)
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h)
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r)
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath()
}
function rrectTop(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r)
  ctx.lineTo(x+w,y+h);ctx.lineTo(x,y+h);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath()
}

function exportData() {
  const data = JSON.stringify({
    version: 2,
    babyName: S.babyName,

    mood: store.getMood(),           // nhật ký tâm trạng
    at: new Date().toISOString()
  }, null, 2)

  // iOS Web Share API (share sheet → Lưu vào Files / AirDrop...)
  if (navigator.share) {
    try {
      const file = new File([data], 'baby-tracker-' + todayStr() + '.json', { type: 'application/json' })
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        navigator.share({ files: [file], title: 'Baby Tracker Backup' })
          .catch(err => { if (err.name !== 'AbortError') set({ exportModal: data }) })
        return
      }
    } catch(e) {}
  }

  // Fallback: hiện modal để copy hoặc download
  set({ exportModal: data })
}


function downloadJsonFile() {
  const data = S.exportModal
  if (!data) return

  const filename = 'baby-tracker-' + todayStr() + '.json'

  // iOS Safari (không có <a download>) → Web Share API → "Lưu vào Tệp"
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream
  if (isIOS && navigator.share) {
    try {
      const file = new File([data], filename, { type: 'application/json' })
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        navigator.share({ files: [file], title: 'Baby Tracker Backup' }).catch(() => {})
        return
      }
    } catch(e) {}
  }

  // Desktop & Android: blob download — luôn hoạt động
  const blob = new Blob([data], { type: 'application/json' })
  const url  = URL.createObjectURL(blob)
  const a    = document.createElement('a')
  a.href     = url
  a.setAttribute('download', filename)
  a.style.display = 'none'
  document.body.appendChild(a)
  a.click()
  document.body.removeChild(a)
  setTimeout(() => URL.revokeObjectURL(url), 2000)
}

  ]
  if (ws.avg.wake) stats.push(
    { emoji:'⏱️', label:'Wake window TB',  val: ws.avg.wake, min: std.wakeMin,         max: std.wakeMax,        unit:' phút' }
  )

  let y = PAD/2 + 100
  const rowH = 56
  stats.forEach(s => {
    const st = statusOf(s.val, s.min, s.max)
    const clrs = { green:['#f0fdf4','#22c55e','#14532d'], yellow:['#fefce8','#eab308','#713f12'], red:['#fff1f2','#f43f5e','#9f1239'] }
    const [bg, border, text] = clrs[st]
    const icon = st==='green'?'✅':st==='yellow'?'🟡':'🔴'

    // Row bg
    ctx.fillStyle = bg; rrect(ctx, PAD+4, y, W-PAD*2-8, rowH-4, 10); ctx.fill()
    ctx.strokeStyle = border; ctx.lineWidth = 1.5; rrect(ctx, PAD+4, y, W-PAD*2-8, rowH-4, 10); ctx.stroke()

    // Emoji + label
    ctx.font = '18px serif'; ctx.textAlign = 'left'; ctx.fillText(s.emoji, PAD+16, y+rowH/2+6)
    ctx.fillStyle = text; ctx.font = 'bold 13px -apple-system,sans-serif'
    ctx.fillText(s.label, PAD+42, y+rowH/2-2)
    ctx.fillStyle = '#6b7280'; ctx.font = '11px -apple-system,sans-serif'
    ctx.fillText('Chuẩn: ' + s.min + '–' + s.max + s.unit, PAD+42, y+rowH/2+14)

    // Value + icon
    ctx.textAlign = 'right'
    ctx.fillStyle = '#111827'; ctx.font = 'bold 18px -apple-system,sans-serif'
    ctx.fillText(s.val + s.unit, W-PAD-36, y+rowH/2+6)
    ctx.font = '16px serif'; ctx.fillText(icon, W-PAD-14, y+rowH/2+6)
    ctx.textAlign = 'left'
    y += rowH
  })

  // Bar charts
  y += 12
  const charts = [
    { title:'Số cữ ăn', emoji:'🍼', color:'#f59e0b', fn: (logs) => logs.filter(l=>l.activityId==='feed').length, max: std.feedMax },
    { title:'Giờ ngủ',  emoji:'😴', color:'#3b82f6', fn: (logs) => Math.round(logs.filter(l=>l.activityId==='sleep').reduce((s,l)=>s+(l.duration||0),0)/60*10)/10, max: std.sleepMax/60 },
  ]

  charts.forEach(chart => {
    const barData = dates.map(d => {
      const logs = logsForDate(d)
      const [yr,mo,day] = d.split('-').map(Number)
      const dt = new Date(yr,mo-1,day)
      return { label: dayNames[dt.getDay()], val: chart.fn(logs), hasData: logs.length>0 }
    })
    const maxV = Math.max(...barData.map(b=>b.val), 1)
    const chartH = 70
    const barW   = (W - PAD*2 - 16) / 7

    // Chart title
    ctx.font = '13px serif'; ctx.fillText(chart.emoji, PAD+8, y+14)
    ctx.fillStyle = '#374151'; ctx.font = 'bold 12px -apple-system,sans-serif'
    ctx.fillText(chart.title + ' theo ngày', PAD+28, y+14)
    y += 22

    barData.forEach((b, i) => {
      const bx   = PAD + 8 + i * barW
      const barH = b.hasData && b.val > 0 ? Math.max(6, Math.round((b.val/maxV)*(chartH-20))) : 3
      const by   = y + chartH - 20 - barH

      // Bar
      ctx.fillStyle = b.hasData ? chart.color : '#e5e7eb'
      rrect(ctx, bx+2, by, barW-6, barH, 3); ctx.fill()

      // Day label
      ctx.fillStyle = '#9ca3af'; ctx.font = 'bold 10px -apple-system,sans-serif'; ctx.textAlign = 'center'
      ctx.fillText(b.label, bx + barW/2, y + chartH - 6)

      // Value
      if (b.hasData && b.val > 0) {
        ctx.fillStyle = chart.color; ctx.font = 'bold 10px -apple-system,sans-serif'
        ctx.fillText(b.val, bx + barW/2, by - 3)
      }
      ctx.textAlign = 'left'
    })
    y += chartH + 8
  })

  // Footer
  ctx.textAlign = 'center'; ctx.font = '11px -apple-system,sans-serif'; ctx.fillStyle = '#d1d5db'
  ctx.fillText('Baby Tracker · ' + S.babyName + ' · ' + weekStart + ' – ' + weekEnd, W/2, H-PAD/2-10)

  canvas.toBlob(blob => {
    if (!blob) { alert('Lỗi tạo ảnh!'); return }
    const file = new File([blob], 'baby-week-' + todayStr() + '.png', { type: 'image/png' })
    if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] }))
      navigator.share({ files: [file], title: 'Tổng kết tuần · ' + S.babyName }).catch(() => {})
    else {
      const a = Object.assign(document.createElement('a'), { href: URL.createObjectURL(blob), download: 'baby-week-' + todayStr() + '.png' })
      document.body.appendChild(a); a.click(); document.body.removeChild(a)
    }
  }, 'image/png')
}


// ── Doctor Report Canvas ─────────────────────────────────────────
function exportDoctorReport() {
  const ws=weeklyStats()
  const growth=store.getGrowth()
  const healthNotes=store.getHealth().slice(0,3)
  const vaccines=store.getVaccines()
  const vacDates=getVaccineDates()
  const cfg=store.getSettings()
  const gender=cfg.babyGender||'girl'
  const months=getGrowthChartMonth()
  const std=STANDARDS[Math.min(6,Math.max(1,months))]
  const latest=growth.length?growth[growth.length-1]:null
  const wRef=WHO.weight[gender][months]
  const hRef=WHO.height[gender][months]
  const upcoming=VACCINE_SCHEDULE.filter(v=>!vaccines[v.id]&&vacDates[v.id]&&vacDates[v.id]>=todayStr()).slice(0,4)

  const dpr=Math.min(window.devicePixelRatio||2,3)
  const W=680, H=920, PAD=28
  const canvas=document.createElement('canvas')
  canvas.width=W*dpr; canvas.height=H*dpr
  const ctx=canvas.getContext('2d'); ctx.scale(dpr,dpr)

  // BG
  ctx.fillStyle='#f0f4f8'; ctx.fillRect(0,0,W,H)
  ctx.shadowColor='rgba(0,0,0,0.08)'; ctx.shadowBlur=16; ctx.shadowOffsetY=3
  ctx.fillStyle='#fff'; rrect(ctx,PAD/2,PAD/2,W-PAD,H-PAD,18); ctx.fill()
  ctx.shadowColor='transparent'; ctx.shadowBlur=0

  // Header
  const g=ctx.createLinearGradient(0,PAD/2,W,PAD/2)
  g.addColorStop(0,'#1e40af'); g.addColorStop(1,'#3b82f6')
  ctx.fillStyle=g; rrectTop(ctx,PAD/2,PAD/2,W-PAD,80,18); ctx.fill()
  ctx.fillStyle='white'; ctx.textAlign='left'; ctx.font='bold 20px -apple-system,sans-serif'
  ctx.fillText('📋 Báo cáo sức khoẻ bé · '+S.babyName, PAD+12, PAD/2+34)
  ctx.font='13px -apple-system,sans-serif'; ctx.fillStyle='rgba(255,255,255,.8)'
  ctx.fillText('Ngày xuất: '+fmtDateLong(todayStr())+'  ·  '+std?.label||'', PAD+12, PAD/2+56)

  let y=PAD/2+96

  // Section helper
  function section(title, color) {
    ctx.fillStyle=color||'#f8fafc'; ctx.fillRect(PAD+4, y, W-PAD*2-8, 26)
    ctx.fillStyle='#1e293b'; ctx.font='bold 13px -apple-system,sans-serif'; ctx.textAlign='left'
    ctx.fillText(title, PAD+12, y+17); y+=30
  }
  function row(label, value, note='', ok=true) {
    ctx.font='12px -apple-system,sans-serif'; ctx.fillStyle='#374151'
    ctx.fillText(label, PAD+16, y+14)
    ctx.textAlign='right'; ctx.font='bold 13px -apple-system,sans-serif'
    ctx.fillStyle=ok?'#15803d':'#dc2626'; ctx.fillText(value, W-PAD-16, y+14)
    if(note){ ctx.font='11px -apple-system,sans-serif'; ctx.fillStyle='#9ca3af'; ctx.fillText(note, W-PAD-16, y+27); y+=14 }
    ctx.textAlign='left'; ctx.strokeStyle='#f1f5f9'; ctx.lineWidth=1
    ctx.beginPath(); ctx.moveTo(PAD+8,y+20); ctx.lineTo(W-PAD-8,y+20); ctx.stroke()
    y+=24
  }

  // 1. Growth
  section('📏 TĂNG TRƯỞNG', '#eff6ff')
  if(latest) {
    if(latest.weight!=null){ const st=getWhoStatus(latest.weight,wRef); row('Cân nặng', latest.weight+'kg', st?.text||'', st?.status==='ok') }
    if(latest.height!=null){ const st=getWhoStatus(latest.height,hRef); row('Chiều cao', latest.height+'cm', st?.text||'', st?.status==='ok') }
    if(latest.headCirc!=null) row('Vòng đầu', latest.headCirc+'cm', '')
    row('Ngày đo', fmtDateLong(latest.date), '')
  } else { ctx.fillStyle='#9ca3af'; ctx.font='12px -apple-system,sans-serif'; ctx.fillText('Chưa có dữ liệu tăng trưởng', PAD+16, y+14); y+=28 }
  y+=6

  // 2. Weekly summary
  section('📊 SINH HOẠT 7 NGÀY QUA', '#f0fdf4')
  if(ws) {
    const {avg}=ws
    row('Số cữ ăn / ngày', avg.feed+' lần', 'Chuẩn: '+std?.feedMin+'-'+std?.feedMax+' lần', avg.feed>=std?.feedMin&&avg.feed<=std?.feedMax)
    row('Tổng ngủ / ngày', fmtDur(avg.sleep), 'Chuẩn: '+fmtDur(std?.sleepMin)+'-'+fmtDur(std?.sleepMax), avg.sleep>=std?.sleepMin&&avg.sleep<=std?.sleepMax)
    row('Số tã / ngày', avg.diapers+' tã', 'Chuẩn: 6-8 tã', avg.diapers>=6)
  } else { ctx.fillStyle='#9ca3af'; ctx.font='12px -apple-system,sans-serif'; ctx.fillText('Chưa đủ dữ liệu', PAD+16, y+14); y+=28 }
  y+=6

  // 3. Vaccines
  section('💉 TIÊM CHỦNG SẮP TỚI', '#fefce8')
  if(upcoming.length) {
    upcoming.forEach(v=>{ row(v.name, vacDates[v.id]?fmtDateLong(vacDates[v.id]):'', v.tag==='DV'?'Dịch vụ':'TCMR', true) })
  } else { ctx.fillStyle='#16a34a'; ctx.font='bold 12px -apple-system,sans-serif'; ctx.fillText('✅ Không có mũi tiêm nào sắp tới', PAD+16, y+14); y+=28 }
  y+=6

  // 4. Health notes
  section('🩺 GHI CHÚ SỨC KHOẺ GẦN ĐÂY', '#fff1f2')
  if(healthNotes.length) {
    healthNotes.forEach(h=>{
      const line=(h.temp?'🌡️'+h.temp+'°C  ':'')+( h.symptoms?.join(', ')||'')+( h.note?' — '+h.note:'')
      ctx.font='12px -apple-system,sans-serif'; ctx.fillStyle='#374151'
      ctx.fillText(fmtDateLong(h.date)+': '+line.slice(0,60)+(line.length>60?'...':''), PAD+16, y+14)
      ctx.strokeStyle='#f1f5f9'; ctx.lineWidth=1
      ctx.beginPath(); ctx.moveTo(PAD+8,y+22); ctx.lineTo(W-PAD-8,y+22); ctx.stroke()
      y+=26
    })
  } else { ctx.fillStyle='#9ca3af'; ctx.font='12px -apple-system,sans-serif'; ctx.fillText('Không có ghi chú sức khoẻ', PAD+16, y+14); y+=28 }

  // Footer
  ctx.fillStyle='#94a3b8'; ctx.font='11px -apple-system,sans-serif'; ctx.textAlign='center'
  ctx.fillText('Baby Tracker · Xuất ngày '+fmtDateLong(todayStr())+' · Dữ liệu tham khảo, không thay thế tư vấn bác sĩ', W/2, H-PAD/2-10)

  canvas.toBlob(blob=>{
    if(!blob){alert('Lỗi!');return}
    const file=new File([blob],'bao-cao-bs-'+todayStr()+'.png',{type:'image/png'})
    if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]}))
      navigator.share({files:[file],title:'Báo cáo sức khoẻ '+S.babyName}).catch(()=>{})
    else {
      const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(blob),download:'bao-cao-bs-'+todayStr()+'.png'})
      document.body.appendChild(a);a.click();document.body.removeChild(a)
    }
  },'image/png')
}

function rSummary(logs) {

  const s=summary(logs)

  const items=[
    {e:'🍼', l:'Lần ăn',    v:s.feed||'–'},
    {e:'☀️', l:'Ngủ ngày',  v:sl.day>0?fmtDur(sl.day):'–'},
    {e:'🌙', l:'Ngủ đêm',   v:sl.night>0?fmtDur(sl.night):'–'},
    {e:'🚼', l:'Số tã',     v:s.diapers||'–'},

// ── Weekly Summary (Feature 3) ────────────────────────────────────
function rWeeklySummary() {
  const months=getStandardsMonth()
  const std=STANDARDS[months]
  const ws=weeklyStats()
  const dates=getWeekDates()
  const dayNames=['CN','T2','T3','T4','T5','T6','T7']

  if(!ws) return `
<div style="padding:16px;text-align:center;color:#9ca3af;">
  <span style="font-size:48px;display:block;margin-bottom:12px;">📊</span>
  <p style="font-size:14px;font-weight:600;margin:0 0 4px;">Chưa đủ dữ liệu</p>
  <p style="font-size:12px;margin:0;">Cần ít nhất 1 ngày có ghi chú</p>
</div>`

  const {avg}=ws

  function statRow(emoji, label, val, min, max, unit='') {
    const st=statusOf(val,min,max),c=STATUS_CLR[st]
    const pct=Math.min(100,Math.round((val/max)*100))
    return `
<div style="background:${c.bg};border:1.5px solid ${c.border};border-radius:14px;padding:12px 14px;margin-bottom:8px;">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
    <div style="display:flex;align-items:center;gap:8px;">
      <span style="font-size:20px;">${emoji}</span>
      <span style="font-size:13px;font-weight:700;color:${c.text};">${label}</span>
    </div>
    <div style="text-align:right;">
      <span style="font-size:16px;font-weight:800;color:#111827;">${val}${unit}</span>
      <span style="font-size:11px;color:#6b7280;margin-left:4px;">/ ${min}–${max}${unit}</span>
    </div>
  </div>
  <div style="background:rgba(0,0,0,.06);border-radius:6px;height:6px;overflow:hidden;">
    <div style="background:${c.border};height:100%;width:${pct}%;border-radius:6px;transition:width .5s;"></div>
  </div>
  <div style="font-size:11px;color:${c.text};margin-top:4px;font-weight:600;">
    ${c.icon} ${st==='green'?'Đạt chuẩn':st==='yellow'?'Cần chú ý':'Cần bổ sung'}
    · Chuẩn tháng ${months} (WHO/AAP)
  </div>
</div>`
  }

  // Bar chart helper
  function barChart(title, emoji, getDayVal, maxVal, colorHex) {
    const bars = dates.map(d => {
      const logs=d===todayStr()?effectiveLogsForDate(d):logsForDate(d)
      const v=getDayVal(logs)
      const [yr,mo,day]=d.split('-').map(Number)
      const dt=new Date(yr,mo-1,day)
      const label=dayNames[dt.getDay()]
      const pct=maxVal>0?Math.round((v/maxVal)*100):0
      const hasData=logs.length>0
      return {label,v,pct,hasData}
    })
    const maxV=Math.max(...bars.map(b=>b.v),1)
    return `
<div style="background:white;border-radius:16px;border:1px solid #f3f4f6;padding:14px;margin-bottom:10px;">
  <div style="font-size:12px;font-weight:700;color:#374151;margin-bottom:12px;">${emoji} ${title}</div>
  <div style="display:flex;align-items:flex-end;gap:4px;height:60px;">
    ${bars.map(b=>`
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;height:100%;">
      <div style="flex:1;width:100%;display:flex;align-items:flex-end;">
        <div style="width:100%;background:${b.hasData?colorHex:'#f3f4f6'};border-radius:4px 4px 0 0;
          height:${b.hasData&&b.v>0?Math.max(8,Math.round((b.v/maxV)*100))+'%':'4px'};
          transition:height .5s;"></div>
      </div>
      <div style="font-size:9px;color:${b.hasData?'#6b7280':'#d1d5db'};font-weight:600;">${b.label}</div>
      ${b.hasData&&b.v>0?`<div style="font-size:9px;color:${colorHex};font-weight:700;">${b.v}</div>`:`<div style="font-size:9px;color:#d1d5db;">–</div>`}
    </div>`).join('')}
  </div>
</div>`
  }

  return `
<div style="padding:0 16px 32px;">
  <!-- Period & standard label -->
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
    <div>
      <div style="font-size:13px;font-weight:800;color:#1f2937;">7 ngày gần nhất</div>
      <div style="font-size:11px;color:#9ca3af;">${ws.avg.days} ngày có dữ liệu · So với chuẩn ${std.label}</div>
    </div>
    <div style="background:#fff1f2;border:1.5px solid #fda4af;border-radius:12px;padding:6px 12px;font-size:12px;font-weight:700;color:#e11d48;">
      Tháng ${months}
    </div>
  </div>

  <!-- Stats comparison -->
  ${statRow('🍼','Số cữ ăn / ngày', avg.feed, std.feedMin, std.feedMax, ' lần')}
  ${statRow('😴','Tổng ngủ / ngày',  Math.round(avg.sleep/60), std.sleepMin/60, std.sleepMax/60, 'h')}
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;">
    <div style="background:#fffbeb;border:1.5px solid #fde68a;border-radius:14px;padding:10px 12px;text-align:center;">
      <div style="font-size:18px;margin-bottom:2px;">☀️</div>
      <div style="font-size:14px;font-weight:800;color:#111827;">${avg.sleepDay>0?fmtDur(avg.sleepDay):'–'}</div>
      <div style="font-size:10px;color:#9ca3af;">Ngủ ngày TB/ngày</div>
    </div>
    <div style="background:#eff6ff;border:1.5px solid #bfdbfe;border-radius:14px;padding:10px 12px;text-align:center;">
      <div style="font-size:18px;margin-bottom:2px;">🌙</div>
      <div style="font-size:14px;font-weight:800;color:#111827;">${avg.sleepNight>0?fmtDur(avg.sleepNight):'–'}</div>
      <div style="font-size:10px;color:#9ca3af;">Ngủ đêm TB/ngày</div>
    </div>
  </div>
  ${statRow('🚼','Số tã / ngày',      avg.diapers, std.diaperMin, std.diaperMax, ' tã')}
  ${avg.wake ? statRow('⏱️','Wake window TB', avg.wake, std.wakeMin, std.wakeMax, ' phút') : ''}

  <div style="height:1px;background:#f3f4f6;margin:16px 0;"></div>

  <!-- Bar charts -->
  ${barChart('Số cữ ăn theo ngày', '🍼', (logs)=>logs.filter(l=>l.activityId==='feed').length, std.feedMax, '#f59e0b')}
  ${barChart('Ngủ ngày theo ngày (06:00-20:00)', '☀️', (logs)=>Math.round(splitSleepDayNight(logs).day/60*10)/10, std.sleepMax/60/2, '#f59e0b')}
  ${barChart('Ngủ đêm theo ngày (20:00-06:00)', '🌙', (logs)=>Math.round(splitSleepDayNight(logs).night/60*10)/10, std.sleepMax/60/2, '#3b82f6')}
  ${barChart('Số tã theo ngày', '🚼', (logs)=>logs.filter(l=>l.activityId.startsWith('diaper')).length, std.diaperMax, '#0ea5e9')}

  <button onclick="exportWeekImage()"
    style="display:flex;align-items:center;justify-content:center;gap:8px;width:100%;margin-top:14px;background:#fff1f2;border:1.5px solid #fda4af;color:#e11d48;border-radius:14px;padding:12px;font-size:13px;font-weight:700;cursor:pointer;">
    🖼️ Lưu ảnh tổng kết tuần
  </button>
  <div style="text-align:center;font-size:11px;color:#d1d5db;margin-top:10px;">Nguồn: WHO + AAP guidelines</div>
</div>`
}

  const today=todayStr()
  const upcoming=VACCINE_SCHEDULE.filter(v=>!done[v.id]&&dates[v.id]&&dates[v.id]>=today).slice(0,3)

  return `

  ${!cfg.birthDate?`

    <div style="font-size:12px;color:#78350f;margin-bottom:10px;">Để tính ngày tiêm chủng chính xác, hãy vào Cài đặt nhập ngày sinh bé.</div>

    ${overdue.map(v=>`
    <div style="background:#fff1f2;border:1.5px solid #fca5a5;border-radius:12px;padding:10px 14px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;">
      <div>
        <div style="font-size:13px;font-weight:700;color:#dc2626;">${v.name}</div>
        <div style="font-size:11px;color:#6b7280;">Dự kiến: ${dates[v.id]?fmtDateLong(dates[v.id]):''} · ${v.tag==='DV'?'Dịch vụ':'TCMR'}</div>
      </div>
      <button onclick="toggleVaccine('${v.id}')" style="background:#dc2626;color:white;border:none;border-radius:10px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0;margin-left:8px;">✅ Đã tiêm</button>
    </div>`).join('')}
  </div>`:''}

  ${upcoming.length?`
  <div style="margin-bottom:12px;">
    <div style="font-size:11px;font-weight:700;color:#d97706;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;">🟡 Sắp tới</div>
    ${upcoming.map(v=>`
    <div style="background:#fffbeb;border:1.5px solid #fbbf24;border-radius:12px;padding:10px 14px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;">
      <div>
        <div style="font-size:13px;font-weight:700;color:#92400e;">${v.name}</div>
        <div style="font-size:11px;color:#6b7280;">Dự kiến: ${dates[v.id]?fmtDateLong(dates[v.id]):''} · ${v.tag==='DV'?'Dịch vụ':'TCMR'}</div>
      </div>
      <button onclick="toggleVaccine('${v.id}')" style="background:#f59e0b;color:white;border:none;border-radius:10px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0;margin-left:8px;">✅ Đã tiêm</button>
    </div>`).join('')}
  </div>`:''}

  <div style="font-size:11px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;">Toàn bộ lịch tiêm</div>
  <div style="display:flex;flex-direction:column;gap:6px;">

      <div style="flex:1;min-width:0;">
        <div style="font-size:13px;font-weight:${isDone?'600':'700'};color:${isDone?'#6b7280':'#1f2937'};${isDone?'text-decoration:line-through;':''}">${v.name}</div>

    </div>`}).join('')}
  </div>
</div>`
}

// ── Mood Tab ──────────────────────────────────────────────────────
function rMoodTab() {
  const all=store.getMood()
  const week=all.filter(m=>{
    const d=new Date(m.date),n=new Date()
    return (n-d)/(1000*60*60*24)<=7
  })
  const lowDays=week.filter(m=>m.score<=2).length
  return `
<div style="padding:0 16px 32px;">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
    <div>
      <div style="font-size:11px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.08em;">Mood của mẹ</div>
      <div style="font-size:11px;color:#9ca3af;margin-top:2px;">Ghi lại mỗi ngày để theo dõi sức khoẻ tinh thần</div>
    </div>
    <button onclick="set({moodModal:true})"
      style="background:#f43f5e;color:white;border:none;border-radius:20px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;">+ Ghi mood</button>
  </div>

  ${lowDays>=3?`
  <div style="background:#fef3c7;border:1.5px solid #fbbf24;border-radius:14px;padding:14px;margin-bottom:14px;">
    <div style="font-size:13px;font-weight:700;color:#92400e;margin-bottom:4px;">💛 Mẹ ơi, cần chú ý sức khoẻ tinh thần</div>
    <div style="font-size:12px;color:#78350f;line-height:1.5;">Mẹ có ${lowDays} ngày mood thấp trong tuần qua. Trầm cảm sau sinh rất phổ biến và hoàn toàn có thể điều trị. Hãy chia sẻ với người thân hoặc bác sĩ nếu cảm thấy không ổn nhé 💛</div>
  </div>`:''}

  ${week.length?`
  <div style="background:white;border-radius:14px;border:1px solid #f3f4f6;padding:12px;margin-bottom:14px;">
    <div style="font-size:11px;font-weight:700;color:#9ca3af;margin-bottom:10px;">7 ngày gần nhất</div>
    <div style="display:flex;gap:6px;justify-content:center;">
      ${getWeekDates().map(d=>{
        const m=all.find(x=>x.date===d)
        const ml=m?MOOD_LEVELS.find(l=>l.score===m.score):null
        return `<div style="flex:1;text-align:center;">
          <div style="font-size:20px;">${ml?ml.emoji:'·'}</div>
          <div style="font-size:9px;color:#9ca3af;">${fmtDate(d).split(',')[0]}</div>
        </div>`
      }).join('')}
    </div>
  </div>`:''}

  ${!all.length?`<div style="text-align:center;padding:32px;color:#9ca3af;"><span style="font-size:40px;">💝</span><p style="font-size:13px;margin-top:8px;">Chưa có ghi chú mood nào.<br>Theo dõi cảm xúc mỗi ngày giúp phát hiện sớm trầm cảm sau sinh.</p></div>`:''}
  <div style="display:flex;flex-direction:column;gap:6px;">
    ${all.slice(0,20).map(r=>{
      const ml=MOOD_LEVELS.find(l=>l.score===r.score)||MOOD_LEVELS[2]
      return `
    <div style="background:white;border-radius:12px;border:1.5px solid ${ml.clr}22;padding:10px 14px;display:flex;align-items:center;gap:10px;">
      <span style="font-size:28px;">${ml.emoji}</span>
      <div style="flex:1;">
        <div style="font-size:13px;font-weight:700;color:${ml.clr};">${ml.label}</div>
        <div style="font-size:11px;color:#9ca3af;">${fmtDateLong(r.date)} · ${r.time}</div>
        ${r.note?`<div style="font-size:12px;color:#6b7280;font-style:italic;margin-top:2px;">${esc(r.note)}</div>`:''}
      </div>
      <button onclick="deleteMood('${r.id}')" style="background:none;border:none;cursor:pointer;font-size:14px;color:#9ca3af;">🗑️</button>
    </div>`}).join('')}
  </div>
</div>`
}
